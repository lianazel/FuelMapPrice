name: Update fuel data

on:
  schedule:
    # Toutes les heures, à la minute 07 (pour décaler des pics généraux)
    - cron: "7 * * * *"
  workflow_dispatch:        # permet de lancer manuellement depuis l'onglet Actions

permissions:
  contents: write           # nécessaire pour committer les JSON dans le repo

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      # Pinning par hash : protège contre une compromission du tag mutable @v4.
      # Cf. attaque tj-actions/changed-files (mars 2025) où un push silencieux
      # sur le tag a fait exécuter du code malveillant dans les runners.
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Fetch & parse fuel data
        run: python scripts/fetch-data.py

      - name: Commit refreshed data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet -- data/; then
            echo "Aucun changement dans data/ — rien à commit."
            exit 0
          fi

          git add data/stations.json data/history.json data/oil-prices.json
          git commit -m "chore(data): refresh $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
