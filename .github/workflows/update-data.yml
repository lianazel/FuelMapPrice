name: Update fuel data

on:
  schedule:
    # Toutes les heures, à la minute 07 (pour décaler des pics généraux)
    - cron: "7 * * * *"
  workflow_dispatch:        # permet de lancer manuellement depuis l'onglet Actions

permissions:
  contents: write           # nécessaire pour committer les JSON dans le repo

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch & parse fuel data
        run: python scripts/fetch-data.py

      - name: Commit refreshed data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet -- data/; then
            echo "Aucun changement dans data/ — rien à commit."
            exit 0
          fi

          git add data/stations.json data/history.json
          git commit -m "chore(data): refresh $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
